<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Micro Foods Market backend architecture</title>
  <desc id="desc">A clean architecture diagram showing a gateway connected to five Flask microservices and a database layer.</desc>
  <rect width="1200" height="800" fill="#f8faf7"/>
  <rect x="70" y="70" width="1060" height="660" rx="28" fill="#ffffff" stroke="#dfe7df" stroke-width="3"/>
  <text x="110" y="140" fill="#17211b" font-family="Arial, sans-serif" font-size="48" font-weight="800">Micro Foods Market</text>
  <text x="110" y="184" fill="#5d6b62" font-family="Arial, sans-serif" font-size="24">Dockerized Flask microservices backend</text>
  <rect x="455" y="240" width="290" height="90" rx="18" fill="#0f7b63"/>
  <text x="600" y="295" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">API Gateway</text>
  <g fill="none" stroke="#97b8aa" stroke-width="5">
    <path d="M600 330v68"/>
    <path d="M600 398H220v68"/>
    <path d="M600 398H410v68"/>
    <path d="M600 398v68"/>
    <path d="M600 398h190v68"/>
    <path d="M600 398h380v68"/>
  </g>
  <g font-family="Arial, sans-serif">
    <g>
      <rect x="115" y="465" width="210" height="96" rx="16" fill="#dff3ec" stroke="#0f7b63" stroke-width="2"/>
      <text x="220" y="508" fill="#17211b" font-size="25" font-weight="800" text-anchor="middle">Auth</text>
      <text x="220" y="538" fill="#5d6b62" font-size="18" text-anchor="middle">JWT users</text>
    </g>
    <g>
      <rect x="305" y="465" width="210" height="96" rx="16" fill="#fff1d6" stroke="#b7791f" stroke-width="2"/>
      <text x="410" y="508" fill="#17211b" font-size="25" font-weight="800" text-anchor="middle">Orders</text>
      <text x="410" y="538" fill="#5d6b62" font-size="18" text-anchor="middle">Transactions</text>
    </g>
    <g>
      <rect x="495" y="465" width="210" height="96" rx="16" fill="#ffe7df" stroke="#b85a3d" stroke-width="2"/>
      <text x="600" y="508" fill="#17211b" font-size="25" font-weight="800" text-anchor="middle">Search</text>
      <text x="600" y="538" fill="#5d6b62" font-size="18" text-anchor="middle">Products</text>
    </g>
    <g>
      <rect x="685" y="465" width="210" height="96" rx="16" fill="#e8edf8" stroke="#566fa7" stroke-width="2"/>
      <text x="790" y="508" fill="#17211b" font-size="25" font-weight="800" text-anchor="middle">Logging</text>
      <text x="790" y="538" fill="#5d6b62" font-size="18" text-anchor="middle">Events</text>
    </g>
    <g>
      <rect x="875" y="465" width="210" height="96" rx="16" fill="#edf2e7" stroke="#738457" stroke-width="2"/>
      <text x="980" y="508" fill="#17211b" font-size="25" font-weight="800" text-anchor="middle">Catalog</text>
      <text x="980" y="538" fill="#5d6b62" font-size="18" text-anchor="middle">Inventory</text>
    </g>
  </g>
  <rect x="300" y="620" width="600" height="64" rx="16" fill="#17211b"/>
  <text x="600" y="660" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">SQLite data layer + Docker Compose networking</text>
</svg>
